  <text x="60" y="108" text-anchor="middle" fill="white" font-size="10" font-family="system-ui">👥</text>
  <text x="180" y="108" text-anchor="middle" fill="white" font-size="10" font-family="system-ui">📱</text>
  <text x="300" y="108" text-anchor="middle" fill="white" font-size="10" font-family="system-ui">📋</text>
  <text x="420" y="108" text-anchor="middle" fill="white" font-size="10" font-family="system-ui">⭐</text>
