<svg width="480" height="320" viewBox="0 0 480 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="480" height="320" rx="20" fill="#FFF7ED"/>

  <!-- Card -->
  <rect x="40" y="40" width="400" height="240" rx="20" fill="#111827"/>
  <rect x="40" y="40" width="400" height="240" rx="20" fill="url(#cardGrad)" fill-opacity="0.15"/>

  <!-- Card top bar -->
  <rect x="40" y="40" width="400" height="6" rx="3" fill="#F97316"/>

  <!-- Logo area -->
  <rect x="64" y="68" width="36" height="36" rx="10" fill="#F97316"/>
  <text x="82" y="91" text-anchor="middle" fill="white" font-size="13" font-weight="800" font-family="system-ui">IP</text>
  <text x="112" y="82" fill="white" font-size="13" font-weight="800" font-family="system-ui">IkiminaPass</text>
  <text x="112" y="97" fill="#9CA3AF" font-size="9" font-family="system-ui">Credit Passport</text>

  <!-- Score arc background -->
  <circle cx="340" cy="160" r="64" fill="#1F2937"/>
  <circle cx="340" cy="160" r="64" stroke="#374151" stroke-width="2" fill="none"/>
  <!-- Arc progress (742/850 = 87%) -->
  <circle cx="340" cy="160" r="52" stroke="#F97316" stroke-width="8" fill="none"
    stroke-dasharray="283" stroke-dashoffset="37" stroke-linecap="round"
    transform="rotate(-90 340 160)"/>
  <text x="340" y="153" text-anchor="middle" fill="white" font-size="26" font-weight="900" font-family="system-ui">742</text>
  <text x="340" y="170" text-anchor="middle" fill="#F97316" font-size="9" font-weight="700" font-family="system-ui">EXCELLENT</text>
  <text x="340" y="184" text-anchor="middle" fill="#6B7280" font-size="8" font-family="system-ui">out of 850</text>

  <!-- Member info -->
  <text x="64" y="148" fill="#9CA3AF" font-size="9" font-family="system-ui">MEMBER</text>
  <text x="64" y="166" fill="white" font-size="14" font-weight="700" font-family="system-ui">Uwimana Marie</text>
  <text x="64" y="184" fill="#6B7280" font-size="10" font-family="system-ui">+250 78X XXX XXX</text>

  <!-- Stats row -->
  <rect x="64" y="204" width="80" height="52" rx="10" fill="#1F2937"/>
  <text x="104" y="224" text-anchor="middle" fill="#F97316" font-size="14" font-weight="800" font-family="system-ui">24</text>
  <text x="104" y="238" text-anchor="middle" fill="#9CA3AF" font-size="8" font-family="system-ui">months</text>
  <text x="104" y="249" text-anchor="middle" fill="#6B7280" font-size="7" font-family="system-ui">tenure</text>

  <rect x="156" y="204" width="80" height="52" rx="10" fill="#1F2937"/>
  <text x="196" y="224" text-anchor="middle" fill="#F97316" font-size="14" font-weight="800" font-family="system-ui">98%</text>
  <text x="196" y="238" text-anchor="middle" fill="#9CA3AF" font-size="8" font-family="system-ui">on-time</text>
  <text x="196" y="249" text-anchor="middle" fill="#6B7280" font-size="7" font-family="system-ui">payments</text>

  <rect x="248" y="204" width="80" height="52" rx="10" fill="#1F2937"/>
  <text x="288" y="224" text-anchor="middle" fill="#F97316" font-size="14" font-weight="800" font-family="system-ui">0</text>
  <text x="288" y="238" text-anchor="middle" fill="#9CA3AF" font-size="8" font-family="system-ui">missed</text>
  <text x="288" y="249" text-anchor="middle" fill="#6B7280" font-size="7" font-family="system-ui">payments</text>

  <!-- Verified badge -->
  <rect x="64" y="268" width="80" height="20" rx="10" fill="#F97316" fill-opacity="0.15"/>
  <text x="104" y="282" text-anchor="middle" fill="#F97316" font-size="9" font-weight="700" font-family="system-ui">✓ VERIFIED</text>

  <defs>
    <linearGradient id="cardGrad" x1="40" y1="40" x2="440" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F97316"/>
      <stop offset="1" stop-color="#C2410C"/>
    </linearGradient>
  </defs>
</svg>
